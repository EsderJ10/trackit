# Builds a standalone, offline TrackIt APK entirely inside a container — no
# Android tooling installed on the host. The signed APK is written to
# ./build-output/trackit.apk.
#
# Usage:
#   docker compose run --rm apk-builder       # build once, see live output
#   (first run compiles the image: JDK + Android SDK/NDK, several GB + minutes)
#
# Re-run any time after code changes to produce a fresh APK.
services:
  apk-builder:
    build:
      context: ./docker
    image: trackit-apk-builder
    # Resource caps so a runaway build kills *itself* (OOM inside the cgroup)
    # instead of thrashing the host into a freeze. Tuned for a 15 GB / 6-core
    # machine — leaves the desktop ~5 GB and 2 cores to stay responsive.
    cpus: '4'
    mem_limit: 10g
    memswap_limit: 10g # no extra container swap on top of mem_limit
    environment:
      - CI=1 # keep pnpm / expo non-interactive
      - CMAKE_BUILD_PARALLEL_LEVEL=2 # throttle ninja: cap parallel native C++ compiles
    volumes:
      - ./:/src:ro # repo source, read-only (kept pristine)
      - ./build-output:/output # APK lands here on the host
